[tools]
forge = "latest"

[tasks.compile]
description = "Compile all contracts"
alias = "c"
run = "forge build"

[tasks.test]
description = "Run tests"
alias = "t"
run = "forge test -vv"

[tasks.deploy-counter]
description = "Deploy Counter contract using Foundry keystore"
alias = "dc"
run = '''
#!/usr/bin/env bash
set -euo pipefail
echo "Deploying Counter contract using keystore..."
forge create src/Counter.sol:Counter --rpc-url kaigan --account deployer --password "password123" --broadcast
'''

[tasks.abigen-counter]
description = "Generate Counter ABI for frontend"
alias = "ac"
run = '''
#!/usr/bin/env bash
set -euo pipefail
echo "Generating Counter ABI..."
forge build --silent
if [ -f "out/Counter.sol/Counter.json" ]; then
  echo "ABI generated at: out/Counter.sol/Counter.json"
  # Create frontend ABI directory if it doesn't exist
  mkdir -p ../frontend/src/abi
  # Extract ABI for frontend
  jq '.abi' out/Counter.sol/Counter.json > ../frontend/src/abi/Counter.abi.json 2>/dev/null || echo "jq not available, skipping ABI extraction"
  echo "Extracted ABI at: ../frontend/src/abi/Counter.abi.json"
else
  echo "Error: Counter.json not found"
  exit 1
fi
'''

[tasks.deploy-business-verifier]
description = "Deploy AlwaysAllow and BusinessVerifier contracts"
alias = "dbv"
run = '''
#!/usr/bin/env bash
set -euo pipefail
echo "Deploying Business Verifier system..."
forge script script/DeployBusinessVerifier.s.sol \
  --rpc-url kaigan \
  --account deployer \
  --password "password123" \
  --broadcast
'''

[tasks.abigen-business-verifier]
description = "Generate ABIs for BusinessVerifier contracts"
alias = "abv"
run = '''
#!/usr/bin/env bash
set -euo pipefail
echo "Generating Business Verifier ABIs..."
forge build --silent
if [ -f "out/AlwaysAllow.sol/AlwaysAllow.json" ] && [ -f "out/BusinessVerifier.sol/BusinessVerifier.json" ] && [ -f "out/KnownCompanyUnti.sol/KnownCompanyUnti.json" ]; then
  echo "ABIs generated:"
  echo "  - out/AlwaysAllow.sol/AlwaysAllow.json"
  echo "  - out/BusinessVerifier.sol/BusinessVerifier.json"
  echo "  - out/KnownCompanyUnti.sol/KnownCompanyUnti.json"
  # Create frontend ABI directory if it doesn't exist
  mkdir -p ../frontend/src/abi
  # Extract ABI only for frontend
  jq '.abi' out/AlwaysAllow.sol/AlwaysAllow.json > ../frontend/src/abi/AlwaysAllow.abi.json 2>/dev/null || echo "jq not available for AlwaysAllow"
  jq '.abi' out/BusinessVerifier.sol/BusinessVerifier.json > ../frontend/src/abi/BusinessVerifier.abi.json 2>/dev/null || echo "jq not available for BusinessVerifier"
  jq '.abi' out/KnownCompanyUnti.sol/KnownCompanyUnti.json > ../frontend/src/abi/KnownCompanyUnti.abi.json 2>/dev/null || echo "jq not available for KnownCompanyUnti"
  echo "Extracted ABIs:"
  echo "  - ../frontend/src/abi/AlwaysAllow.abi.json"
  echo "  - ../frontend/src/abi/BusinessVerifier.abi.json"
  echo "  - ../frontend/src/abi/KnownCompanyUnti.abi.json"
else
  echo "Error: Contract JSON files not found"
  exit 1
fi
'''

[tasks.test-deposit]
description = "Run MamizuCash deposit tests with Hardhat"
alias = "td"
run = '''
#!/usr/bin/env bash
set -euo pipefail
echo "Running MamizuCash deposit tests..."
cd ../privacy-pool
npx hardhat test --grep "deposit"
'''

[tasks.clean]
description = "Clean build artifacts and cache"
alias = "cl"
run = "forge clean"